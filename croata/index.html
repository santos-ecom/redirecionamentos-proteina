<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
</head>
<body>
  <script>
    (function() {
      var destUrl = "https://forseniors.shop/hr/pages/proteina-croata";
      var currentParams = window.location.search;
      if (currentParams) {
        // Check if destination already has query params
        var separator = destUrl.indexOf("?") !== -1 ? "&" : "?";
        destUrl = destUrl + separator + currentParams.substring(1);
      }
      window.location.replace(destUrl);
    })();
  </script>
</body>
</html>
